version: 3

tasks:
  bin:
    desc: "构建二进制文件"
    deps: [":base:clear"]
    sources:
      - ./cmd/**
      - ./internal/**
      - ./pkg/**
      - ./.git/**
      - ./go.mod
      - ./go.sum
      - ./Taskfile.yml
      - ./scripts/go-scripts/**
      - ./scripts/tasks/**
    generates:
      - ./data/dashboard/dashboard
    cmds:
      - cd ./scripts/go-scripts && go run . build

  docker:
    desc: "构建容器镜像 (使用 Podman)"
    deps: [":base:clear", ":build:bin"]
    cmds:
      - cd ./scripts/go-scripts && go run . build-docker {{.CLI_ARGS}}

  release:
    desc: "为多个平台构建发布版本"
    deps: [":base:clear"]
    sources:
      - ./cmd/dashboard/**
      - ./internal/**
      - ./pkg/**
      - ./.git/**
      - ./go.mod
      - ./go.sum
      - ./scripts/go-scripts/**
      - ./scripts/tasks/**
    generates:
      - ./data/release/dashboard-*
    cmds:
      - cd ./scripts/go-scripts && go run . release