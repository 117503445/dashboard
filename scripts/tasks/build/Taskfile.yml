version: 3

tasks:
  bin:
    desc: "构建二进制文件"
    deps: [":base:clear"]
    sources:
      - ./cmd/**
      - ./internal/**
      - ./pkg/**
      - ./.git/**
      - ./go.mod
      - ./go.sum
      - ./Taskfile.yml
      - ./scripts/go-scripts/**
      - ./scripts/tasks/**
    generates:
      - ./data/dashboard/dashboard
    cmds:
      - cd ./scripts/go-scripts && go run . build

  docker:
    desc: "构建 Docker 镜像"
    deps: [":base:clear", ":build:bin"]
    cmds:
      - cd ./scripts/go-scripts && go run . build-docker {{.CLI_ARGS}}